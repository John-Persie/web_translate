<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页翻译插件设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 24 24" width="24" height="24">
        <circle cx="12" cy="12" r="11" fill="#4285f4"/>
        <ellipse cx="12" cy="12" rx="5" ry="11" fill="none" stroke="#fff" stroke-width="1"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="#fff" stroke-width="1"/>
      </svg>
      <h1>网页翻译插件</h1>
    </div>

    <section class="card">
      <h2>API 设置</h2>
      <label for="apiUrl">API 地址 <span class="required">*</span></label>
      <input type="url" id="apiUrl" placeholder="https://your-llm-api/v1/chat/completions" autocomplete="off">
      <p class="hint">兼容 OpenAI 格式的 Chat Completions 接口地址</p>

      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="留空则不需要" autocomplete="off">

      <label for="modelName">模型名称</label>
      <input type="text" id="modelName" placeholder="例如: gpt-3.5-turbo, qwen, glm-4" autocomplete="off">
    </section>

    <section class="card">
      <h2>默认翻译语言</h2>
      <label for="sourceLang">源语言</label>
      <select id="sourceLang">
        <option value="auto">自动检测</option>
        <option value="en">English</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁体中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="th">ไทย</option>
        <option value="vi">Tiếng Việt</option>
        <option value="it">Italiano</option>
        <option value="nl">Nederlands</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="id">Bahasa Indonesia</option>
        <option value="hi">हिन्दी</option>
      </select>

      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁体中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="th">ไทย</option>
        <option value="vi">Tiếng Việt</option>
        <option value="it">Italiano</option>
        <option value="nl">Nederlands</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="id">Bahasa Indonesia</option>
        <option value="hi">हिन्दी</option>
      </select>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn-primary">保存设置</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
